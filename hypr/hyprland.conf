# ======================
# ENVIRONMENT
# ======================

env = XCURSOR_THEME,breeze_cursors
env = HYPRCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_DRM_NO_ATOMIC,1

# ======================
# MONITOR
# ======================

monitor = ,preferred,auto,1.25

# ======================
# VARIABLES
# ======================

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

# ======================
# AUTOSTART
# ======================

exec-once = waybar
exec-once = awww-daemon
exec-once = hypridle
exec-once = bash -c "sleep 1 && ~/.config/hypr/scripts/loadwall"

general {
    gaps_in = 6
    gaps_out = 8

    border_size = 2

    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(565f89aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 0.98
    inactive_opacity = 0.85

     blur {
        enabled = true
        size = 10
        passes = 4
        vibrancy = 0.15
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

input {
    kb_layout = us

    follow_mouse = 1
    sensitivity = -0.1

    touchpad {
        natural_scroll = true
    }
}


source = ~/.config/hypr/binds.conf #SHOULD BE AT BOTTOM
# HyprEmoji config
source = ~/.config/hypremoji.old/hypremoji.conf
